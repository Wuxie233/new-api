name: Build & Deploy Custom Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-1ywyrjk94j4tugmb.cn-shanghai.personal.cr.aliyuncs.com
  ACR_IMAGE: crpi-1ywyrjk94j4tugmb.cn-shanghai.personal.cr.aliyuncs.com/wuxie233/new-api

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Determine version
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            VERSION="custom-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_IMAGE }}:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 60
    env:
      SSH_KEY_PATH: ~/.ssh/deploy_key
      SSH_OPTS: -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=15 -o ServerAliveCountMax=4
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i $SSH_KEY_PATH -p ${{ secrets.DEPLOY_PORT }} $SSH_OPTS root@${{ secrets.DEPLOY_HOST }} bash -s <<'DEPLOY'
          cd /opt/new-api
          docker pull crpi-1ywyrjk94j4tugmb.cn-shanghai.personal.cr.aliyuncs.com/wuxie233/new-api:latest
          docker compose down
          docker compose up -d
          docker image prune -f
          DEPLOY
